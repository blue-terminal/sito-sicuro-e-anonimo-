<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blue-Terminal</title>
    
    <!-- Fix for UMD libraries requiring process.env -->
    <script>
      window.process = { env: { NODE_ENV: 'production' } };
    </script>

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              terminal: {
                bg: '#000000',       // Pure Black
                dark: '#0a0a0a',     // Very Dark Grey for cards
                accent: '#00ff00',   // Hacker Green
                dim: '#004400',      // Dark Green
                text: '#00dd00',     // Readable Green
                red: '#ef4444',
              }
            },
            animation: {
              'blink': 'blink 1s step-end infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'fadeIn': 'fadeIn 0.5s ease-out forwards',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
              glow: {
                'from': { boxShadow: '0 0 5px #00ff00, 0 0 10px #00ff00' },
                'to': { boxShadow: '0 0 15px #00ff00, 0 0 20px #00ff00' },
              },
              fadeIn: {
                'from': { opacity: '0', transform: 'translateY(10px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #000000;
        color: #00dd00;
        /* Reverting to default sans-serif as requested previously, keeping mono for code areas */
        font-family: Arial, sans-serif;
      }
      /* Custom Scrollbar - Green Theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505; 
      }
      ::-webkit-scrollbar-thumb {
        background: #008800; 
        border-radius: 4px;
        border: 1px solid #00ff00;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00ff00; 
      }
      
      /* Input autofill fix for dark theme */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      textarea:-webkit-autofill,
      textarea:-webkit-autofill:hover,
      textarea:-webkit-autofill:focus,
      select:-webkit-autofill,
      select:-webkit-autofill:hover,
      select:-webkit-autofill:focus {
        border: 1px solid #00ff00;
        -webkit-text-fill-color: #00ff00;
        -webkit-box-shadow: 0 0 0px 1000px #000 inset;
        transition: background-color 5000s ease-in-out 0s;
      }
      
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;
      
      // --- Icons ---

        </svg>
      );

      const TerminalIcon = (props) => (
        <Icon {...props}>
          <polyline points="4 17 10 11 4 5"></polyline>

      );

      const User = (props) => (
        <Icon {...props}>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>

      const Code = (props) => (
        <Icon {...props}>

          <polyline points="8 6 2 12 8 18"></polyline>

      );

      const Trash2 = (props) => (

          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </Icon>
      );

      const Send = (props) => (
        <Icon {...props}>
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </Icon>
      );

      const Clock = (props) => (
        <Icon {...props}>
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </Icon>
      );

      const MessageSquare = (props) => (
        <Icon {...props}>
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </Icon>
      );

      const Edit = (props) => (
        <Icon {...props}>
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </Icon>
      );

      const Film = (props) => (
        <Icon {...props}>
          <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
          <line x1="7" y1="2" x2="7" y2="22"></line>
          <line x1="17" y1="2" x2="17" y2="22"></line>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <line x1="2" y1="7" x2="7" y2="7"></line>
          <line x1="2" y1="17" x2="7" y2="17"></line>
          <line x1="17" y1="17" x2="22" y2="17"></line>
          <line x1="17" y1="7" x2="22" y2="7"></line>
        </Icon>
      );

      const Youtube = (props) => (
        <Icon {...props}>
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"></path>
          <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
        </Icon>
      );

      const Play = (props) => (
        <Icon {...props}>
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </Icon>
      );

      const ThumbsUp = (props) => (
        <Icon {...props}>
          <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
        </Icon>
      );

      const Bell = (props) => (
        <Icon {...props}>
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </Icon>
      );

      const BellRing = (props) => (
        <Icon {...props}>
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          <path d="M2 8c0-2.2.7-4.3 2-6"></path>
          <path d="M22 8a10 10 0 0 0-2-6"></path>
        </Icon>
      );

      const Plus = (props) => (
        <Icon {...props}>
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </Icon>
      );

      const AlertTriangle = (props) => (
        <Icon {...props}>
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </Icon>
      );
      
      const Search = (props) => (
        <Icon {...props}>
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </Icon>
      );
      
      const Globe = (props) => (
        <Icon {...props}>
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </Icon>
      );


      // --- Components ---

      const Typewriter = ({ text, speed = 50, delay = 0, className = '' }) => {
        const [displayedText, setDisplayedText] = useState('');
        const [started, setStarted] = useState(false);

        useEffect(() => {
          const timeout = setTimeout(() => {
            setStarted(true);
          }, delay);
          return () => clearTimeout(timeout);
        }, [delay]);

        useEffect(() => {
          if (!started) return;

          let index = 0;
          const interval = setInterval(() => {
            if (index < text.length) {
              setDisplayedText((prev) => prev + text.charAt(index));
              index++;
            } else {
              clearInterval(interval);
            }
          }, speed);

          return () => clearInterval(interval);
        }, [text, speed, started]);

        return (
          <span className={className}>
            {displayedText}
            <span className="animate-blink ml-1 inline-block w-2 h-5 bg-terminal-accent align-middle"></span>
          </span>
        );
      };

      const TechBadge = ({ src, alt, label }) => {
        return (
          <div className="flex flex-col items-center group">
            <div className="p-3 bg-terminal-dark border border-gray-700 rounded hover:border-terminal-accent hover:shadow-[0_0_10px_#00ff00] transition-all duration-300">
              <img src={src} height="40" width="40" alt={alt} className="w-10 h-10 filter grayscale group-hover:grayscale-0 transition-all" />
            </div>
            <span className="mt-2 text-xs text-gray-500 group-hover:text-terminal-accent transition-colors font-mono">
              {label}
            </span>
          </div>
        );
      };

      const SpotManager = () => {
        const [spots, setSpots] = useState([]);
        const [title, setTitle] = useState('');
        const [content, setContent] = useState('');
        const [editingId, setEditingId] = useState(null);

        useEffect(() => {
          const savedSpots = localStorage.getItem('blue-terminal-spots');
          if (savedSpots) {
            setSpots(JSON.parse(savedSpots));
          }
        }, []);

        useEffect(() => {
          localStorage.setItem('blue-terminal-spots', JSON.stringify(spots));
        }, [spots]);

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!title.trim() || !content.trim()) return;

          if (editingId) {
            setSpots(prev => prev.map(spot => 
              spot.id === editingId 
                ? { ...spot, title, content, timestamp: Date.now() }
                : spot
            ));
            setEditingId(null);
          } else {
            const newSpot = {
              id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
              title,
              content,
              timestamp: Date.now(),
            };
            setSpots(prev => [newSpot, ...prev]);
          }
          
          setTitle('');
          setContent('');
        };

        const deleteSpot = (id) => {
          if (window.confirm("Are you sure you want to delete this spot?")) {
            setSpots(prev => prev.filter(s => s.id !== id));
            if (id === editingId) {
              setEditingId(null);
              setTitle('');
              setContent('');
            }
          }
        };

        const editSpot = (spot) => {
          setTitle(spot.title);
          setContent(spot.content);
          setEditingId(spot.id);
        };

        return (
          <div className="max-w-2xl mx-auto mt-10 p-6 bg-terminal-dark border border-terminal-dim rounded-lg shadow-[0_0_15px_rgba(0,255,0,0.1)]">
            <h2 className="text-2xl font-bold mb-6 text-terminal-accent flex items-center gap-2 border-b border-terminal-dim pb-2">
              <Code className="w-6 h-6" />
              <span>~/spot_uploader</span>
            </h2>
            
            <form onSubmit={handleSubmit} className="space-y-4 mb-8">
              <div>
                <input
                  type="text"
                  placeholder="Spot Title"
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  className="w-full bg-black border border-terminal-dim rounded p-3 text-terminal-accent placeholder-gray-700 focus:border-terminal-accent focus:shadow-[0_0_10px_#00ff00] focus:outline-none transition-all font-mono"
                />
              </div>
              <div>
                <textarea
                  placeholder="Write your thoughts..."
                  value={content}
                  onChange={(e) => setContent(e.target.value)}
                  rows="4"
                  className="w-full bg-black border border-terminal-dim rounded p-3 text-terminal-text placeholder-gray-700 focus:border-terminal-accent focus:shadow-[0_0_10px_#00ff00] focus:outline-none transition-all font-mono"
                ></textarea>
              </div>
              <button
                type="submit"
                className="bg-terminal-dim text-terminal-accent border border-terminal-accent hover:bg-terminal-accent hover:text-black hover:shadow-[0_0_15px_#00ff00] px-6 py-2 rounded transition-all duration-300 flex items-center gap-2 w-full justify-center font-bold"
              >
                <TerminalIcon className="w-4 h-4" />
                {editingId ? 'UPDATE_SPOT' : 'DEPLOY_SPOT'}
              </button>
            </form>

            <div className="space-y-4">
              {spots.length === 0 ? (
                <p className="text-gray-600 text-center py-4 font-mono">&lt; No spots deployed yet /&gt;</p>
              ) : (
                spots.map((spot) => (
                  <div key={spot.id} className="bg-black border border-terminal-dim p-4 rounded hover:border-terminal-accent hover:shadow-[0_0_10px_rgba(0,255,0,0.3)] transition-all animate-fadeIn">
                    <div className="flex justify-between items-start mb-2">
                      <h3 className="text-xl font-bold text-terminal-accent font-mono">{spot.title}</h3>
                      <div className="flex gap-2">
                        <button onClick={() => editSpot(spot)} className="text-gray-500 hover:text-terminal-accent transition-colors" title="Edit">
                           <Edit size={16} />
                        </button>
                        <button onClick={() => deleteSpot(spot.id)} className="text-gray-500 hover:text-red-500 transition-colors" title="Delete">
                          <Trash2 size={16} />
                        </button>
                      </div>
                    </div>
                    <p className="text-terminal-text whitespace-pre-wrap font-mono">{spot.content}</p>
                    <div className="mt-2 text-xs text-gray-600 flex items-center gap-1 font-mono">
                      <Clock className="w-3 h-3" />
                      {new Date(spot.timestamp).toLocaleString()}
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        );
      };

      const ChatManager = () => {
        const [messages, setMessages] = useState([]);
        const [nickname, setNickname] = useState('');
        const [inputText, setInputText] = useState('');
        const chatBoxRef = useRef(null);

        useEffect(() => {
          const savedChat = localStorage.getItem('blue-terminal-chat');
          if (savedChat) setMessages(JSON.parse(savedChat));
          
          const savedNick = localStorage.getItem('blue-terminal-nickname');
          if (savedNick) setNickname(savedNick);
        }, []);

        useEffect(() => {
          localStorage.setItem('blue-terminal-chat', JSON.stringify(messages));
          if(chatBoxRef.current) {
            chatBoxRef.current.scrollTop = chatBoxRef.current.scrollHeight;
          }
        }, [messages]);

        useEffect(() => {
          localStorage.setItem('blue-terminal-nickname', nickname);
        }, [nickname]);

        const sendMessage = (e) => {
          e.preventDefault();
          if(!inputText.trim()) return;
          
          const newMsg = {
            id: Date.now() + Math.random().toString(),
            user: nickname || 'Anon',
            text: inputText,
            time: new Date().toLocaleTimeString()
          };
          
          setMessages(prev => [...prev, newMsg]);
          setInputText('');
        };

        const deleteMessage = (id) => {
            if(window.confirm("Delete this message?")) {
                setMessages(prev => prev.filter(m => m.id !== id));
            }
        };

        return (
           <div className="max-w-2xl mx-auto mt-10 p-6 bg-terminal-dark border border-terminal-dim rounded-lg shadow-[0_0_15px_rgba(0,255,0,0.1)] h-[600px] flex flex-col">
              <h2 className="text-2xl font-bold mb-4 text-terminal-accent flex items-center gap-2 border-b border-terminal-dim pb-2">
                <MessageSquare className="w-6 h-6" />
                <span>~/live_chat</span>
              </h2>

              <div className="mb-4">
                <input 
                  className="bg-black border border-terminal-dim rounded px-3 py-2 text-sm text-terminal-accent w-full focus:outline-none focus:border-terminal-accent focus:shadow-[0_0_10px_#00ff00] placeholder-gray-700 font-mono"
                  placeholder="Set Nickname..."
                  value={nickname}
                  onChange={e => setNickname(e.target.value)}
                />
              </div>

              <div ref={chatBoxRef} className="flex-1 overflow-y-auto bg-black border border-terminal-dim rounded p-4 mb-4 space-y-3 shadow-inner">
                {messages.length === 0 && <p className="text-gray-600 text-center italic font-mono">No signals detected...</p>}
                {messages.map(msg => (
                  <div key={msg.id} className="animate-fadeIn font-mono flex justify-between items-start group">
                    <div>
                        <span className="text-xs text-gray-500">[{msg.time}] </span>
                        <span className="font-bold text-terminal-accent">{msg.user}: </span>
                        <span className="text-terminal-text">{msg.text}</span>
                    </div>
                    <button onClick={() => deleteMessage(msg.id)} className="text-gray-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity ml-2">
                        <Trash2 size={12} />
                    </button>
                  </div>
                ))}
              </div>

              <form onSubmit={sendMessage} className="flex gap-2">
                <input 
                  className="flex-1 bg-black border border-terminal-dim rounded p-3 text-terminal-text focus:border-terminal-accent focus:shadow-[0_0_10px_#00ff00] focus:outline-none placeholder-gray-700 font-mono"
                  placeholder="Transmit message..."
                  value={inputText}
                  onChange={e => setInputText(e.target.value)}
                />
                <button type="submit" className="bg-terminal-dim border border-terminal-accent hover:bg-terminal-accent hover:text-black hover:shadow-[0_0_15px_#00ff00] text-terminal-accent px-4 py-2 rounded transition-all">
                  <Send className="w-5 h-5" />
                </button>
              </form>
           </div>
        );
      };

      const CommentsSection = ({ comments, onAddComment }) => {
          const [text, setText] = useState('');
          
          const handleSubmit = (e) => {
              e.preventDefault();
              onAddComment(text);
              setText('');
          };

          return (
              <div className="mt-6 border-t border-terminal-dim pt-4">
                  <h3 className="text-lg font-bold text-gray-300 mb-4 flex items-center gap-2">
                      <MessageSquare size={18} />
                      {comments.length} Comments
                  </h3>
                  
                  {/* Input */}
                  <form onSubmit={handleSubmit} className="flex gap-3 mb-6">
                      <div className="w-8 h-8 rounded-full bg-terminal-dim flex items-center justify-center text-terminal-accent font-bold text-xs">
                          YOU
                      </div>
                      <div className="flex-1">
                          <input 
                              type="text" 
                              className="w-full bg-transparent border-b border-gray-700 focus:border-terminal-accent text-gray-300 py-1 focus:outline-none transition-colors font-mono"
                              placeholder="Add a comment..."
                              value={text}
                              onChange={e => setText(e.target.value)}
                          />
                          <div className="flex justify-end mt-2">
                              <button 
                                type="submit" 
                                disabled={!text.trim()}
                                className="bg-terminal-dim text-terminal-accent px-3 py-1 rounded text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-terminal-accent hover:text-black transition-colors"
                              >
                                  Comment
                              </button>
                          </div>
                      </div>
                  </form>

                  {/* List */}
                  <div className="space-y-4">
                      {comments.map(c => (
                          <div key={c.id} className="flex gap-3">
                              <div className="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center text-gray-500 font-bold text-xs">
                                  {c.user[0]}
                              </div>
                              <div>
                                  <div className="flex items-center gap-2 mb-1">
                                      <span className="text-xs font-bold text-terminal-text font-mono">{c.user}</span>
                                      <span className="text-[10px] text-gray-600 font-mono">{c.time}</span>
                                  </div>
                                  <p className="text-sm text-gray-400">{c.text}</p>
                              </div>
                          </div>
                      ))}
                  </div>
              </div>
          );
      };

      const VideoHub = () => {
        const [videos, setVideos] = useState([]);
        const [selectedVideo, setSelectedVideo] = useState(null);
        const [videoError, setVideoError] = useState(false);
        const [blobUrls, setBlobUrls] = useState({}); // Stores temporary Blob URLs
        const [isServerMode, setIsServerMode] = useState(false); // If loaded from videos.json
        const fileInputRef = useRef(null);
        const repairInputRef = useRef(null);
        
        // User prefs
        const [subscribed, setSubscribed] = useState(false);
        const [bell, setBell] = useState(false);
        const [likedVideos, setLikedVideos] = useState({}); // { videoId: true/false }
        const [videoComments, setVideoComments] = useState({}); // { videoId: [{user, text, time}] }

        // Helper to extract YouTube ID
        const getYouTubeId = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const isYouTube = (url) => {
            return !!getYouTubeId(url);
        };

        // Load data
        useEffect(() => {
          async function initData() {
              let loadedFromServer = false;
              
              // 1. Try fetching videos.json (Folder Loader Logic)
              try {
                  const res = await fetch('videos.json');
                  if (res.ok) {
                      const fileList = await res.json();
                      if (Array.isArray(fileList) && fileList.length > 0) {
                          const serverVideos = fileList.map((filename, idx) => ({
                              id: `server_${idx}`,
                              title: filename.replace(/\.[^/.]+$/, ""),
                              filename: filename, 
                              views: 0,
                              likes: 0
                          }));
                          setVideos(serverVideos);
                          setIsServerMode(true);
                          loadedFromServer = true;
                      }
                  }
              } catch (e) {
                  // videos.json not found
              }

              // 2. Fallback to LocalStorage if no server data
              if (!loadedFromServer) {
                  const savedVideos = localStorage.getItem('blue-terminal-playlist-v8'); // Changed key to force reset to v8
                  if (savedVideos) {
                     const parsed = JSON.parse(savedVideos);
                     if(parsed.length > 0) {
                         setVideos(parsed);
                     } else {
                         // Default if array empty
                         const defaultVid = {
                            id: 'yt_default_v8',
                            title: "Blue Terminal Intro",
                            filename: "https://youtu.be/lXggRCSsbYI",
                            views: 1337,
                            likes: 42
                         };
                         setVideos([defaultVid]);
                         setSelectedVideo(defaultVid);
                     }
                  } else {
                      // Start with the user's YouTube video ONLY
                      const defaultVid = {
                        id: 'yt_default_v8',
                        title: "Blue Terminal Intro",
                        filename: "https://youtu.be/lXggRCSsbYI",
                        views: 1337,
                        likes: 42
                      };
                      setVideos([defaultVid]);
                      setSelectedVideo(defaultVid);
                  }
              }
              
              // Load prefs
              const savedPrefs = localStorage.getItem('blue-terminal-user-prefs');
              if (savedPrefs) {
                 const prefs = JSON.parse(savedPrefs);
                 setSubscribed(prefs.subscribed || false);
                 setBell(prefs.bell || false);
                 setLikedVideos(prefs.likedVideos || {});
              }

              const savedComments = localStorage.getItem('blue-terminal-video-comments');
              if (savedComments) setVideoComments(JSON.parse(savedComments));
          }

          initData();
        }, []);

        // Save data (Only in manual mode do we persist video list changes to LS)
        useEffect(() => {
          if (!isServerMode && videos.length > 0) {
             localStorage.setItem('blue-terminal-playlist-v8', JSON.stringify(videos));
          }
        }, [videos, isServerMode]);

        useEffect(() => {
          const prefs = { subscribed, bell, likedVideos };
          localStorage.setItem('blue-terminal-user-prefs', JSON.stringify(prefs));
        }, [subscribed, bell, likedVideos]);

        useEffect(() => {
            localStorage.setItem('blue-terminal-video-comments', JSON.stringify(videoComments));
        }, [videoComments]);

        // Reset error when changing video
        useEffect(() => {
            setVideoError(false);
        }, [selectedVideo]);
        
        // Auto-play first video on load/mount if not selected
        useEffect(() => {
            if (videos.length > 0 && !selectedVideo) {
                setSelectedVideo(videos[0]);
            }
        }, [videos, selectedVideo]);


        const triggerFileInput = () => {
            if (fileInputRef.current) {
                fileInputRef.current.click();
            }
        };

        const handleUrlLink = () => {
            const url = prompt("Enter video URL (YouTube or .mp4):");
            if(url) {
                const id = Date.now();
                const newVid = {
                    id: id,
                    title: "Linked Video",
                    filename: url,
                    views: 0,
                    likes: 0
                };
                setVideos(prev => [...prev, newVid]);
                setSelectedVideo(newVid);
            }
        };

        const handleFileLink = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const filename = file.name;
            const title = filename.replace(/\.[^/.]+$/, ""); // Remove extension

            // Prevent duplicates
            if (videos.some(v => v.filename === filename)) {
                alert("Video already in playlist!");
                return;
            }

            const id = Date.now();
            
            // Create a Blob URL for immediate playback (doesn't persist refresh, but works instantly)
            const objectUrl = URL.createObjectURL(file);
            setBlobUrls(prev => ({...prev, [id]: objectUrl}));

            const newVid = {
                id: id,
                title: title,
                filename: filename,
                views: 0,
                likes: 0
            };
            setVideos(prev => [...prev, newVid]);
        };

        const handleRepair = (e) => {
            const file = e.target.files[0];
            if(!file || !selectedVideo) return;
            
            // Update the blob URL for the current video ID
            const objectUrl = URL.createObjectURL(file);
            setBlobUrls(prev => ({...prev, [selectedVideo.id]: objectUrl}));
            setVideoError(false); // Clear error to retry playback
        };

        const deleteVideo = (id, e) => {
          e.stopPropagation();
          if(confirm('Delete this video from playlist?')) {
            setVideos(prev => prev.filter(v => v.id !== id));
            if(selectedVideo && selectedVideo.id === id) setSelectedVideo(null);
          }
        };

        const toggleSubscribe = () => {
            setSubscribed(!subscribed);
            if(subscribed) setBell(false);
        };

        const toggleBell = () => {
            if(!subscribed) return;
            setBell(!bell);
        };

        const toggleLike = () => {
            if(!selectedVideo) return;
            const vidId = selectedVideo.id;
            const isLiked = likedVideos[vidId];

            // Update video stats
            const updatedVideos = videos.map(v => {
                if(v.id === vidId) {
                    return { ...v, likes: isLiked ? (v.likes - 1) : (v.likes + 1) };
                }
                return v;
            });
            setVideos(updatedVideos);
            setLikedVideos(prev => ({ ...prev, [vidId]: !isLiked }));

            const updatedSel = updatedVideos.find(v => v.id === vidId);
            setSelectedVideo(updatedSel);
        };

        const addComment = (text) => {
            if(!selectedVideo || !text.trim()) return;
            const vidId = selectedVideo.id;
            const newComment = {
                id: Date.now(),
                user: 'User_' + Math.floor(Math.random()*1000),
                text: text,
                time: new Date().toLocaleDateString()
            };
            setVideoComments(prev => ({
                ...prev,
                [vidId]: [...(prev[vidId] || []), newComment]
            }));
        };

        const getVideoSrc = (video) => {
            if (!video) return '';
            if (blobUrls[video.id]) return blobUrls[video.id];
            
            // If it's a web URL (http/https), return as is
            if (video.filename.match(/^https?:\/\//)) return video.filename;

            // Robust path handling for local files:
            if (video.filename.startsWith('video/')) {
                 return video.filename;
            }
            return `./video/${video.filename}`;
        };

        const isYt = selectedVideo ? isYouTube(selectedVideo.filename) : false;

        return (
          <div className="max-w-4xl mx-auto mt-10 p-4">
             <div className="flex justify-between items-center mb-6 border-b border-terminal-dim pb-4">
                <h2 className="text-2xl font-bold text-terminal-accent flex items-center gap-2">
                  <Film className="w-6 h-6" />
                  <span>Blue-Tube</span>
                </h2>
                <div className="text-xs text-terminal-accent border border-terminal-accent px-2 py-1 rounded shadow-[0_0_5px_#00ff00] flex items-center gap-2 font-mono">
                   {isServerMode ? 'SERVER_LINK_ACTIVE' : 'LOCAL_MEDIA_PLAYER'}
                </div>
             </div>

             <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {/* Main Player Area */}
                <div className="md:col-span-2">
                   <div className="bg-black aspect-video rounded-lg border border-terminal-dim flex items-center justify-center overflow-hidden relative shadow-[0_0_20px_rgba(0,255,0,0.2)]">
                      {selectedVideo ? (
                        <>
                           {isYt ? (
                                <div className="w-full h-full relative">
                                    <iframe 
                                        className="w-full h-full"
                                        src={`https://www.youtube-nocookie.com/embed/${getYouTubeId(selectedVideo.filename)}?autoplay=0&rel=0&modestbranding=1`} 
                                        title={selectedVideo.title}
                                        frameBorder="0"
                                        referrerPolicy="no-referrer"
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowFullScreen
                                    ></iframe>
                                </div>
                           ) : (
                                videoError ? (
                                    <div className="text-center p-6 text-red-500 border border-red-500 rounded bg-red-900/20 max-w-sm mx-auto">
                                        <AlertTriangle size={48} className="mx-auto mb-2" />
                                        <p className="font-bold text-lg">ERROR: FILE NOT FOUND</p>
                                        <p className="text-sm mt-2 text-gray-300">
                                            System could not access <br/>
                                            <span className="font-mono text-terminal-accent break-all">{getVideoSrc(selectedVideo)}</span>
                                        </p>
                                        <div className="mt-4 text-xs text-gray-400 border-t border-red-500/30 pt-4">
                                            <p className="mb-2">1. Ensure folder is named <strong>video</strong>.</p>
                                            <p className="mb-2">2. Ensure file <strong>{selectedVideo.filename}</strong> is inside.</p>
                                            <button 
                                                onClick={() => repairInputRef.current.click()}
                                                className="bg-terminal-dim text-terminal-accent px-4 py-2 rounded border border-terminal-accent hover:bg-terminal-accent hover:text-black font-bold flex items-center gap-2 mx-auto transition-all mt-4"
                                            >
                                                <Search size={14}/>
                                                MANUALLY LOCATE FILE
                                            </button>
                                            <input 
                                                type="file" 
                                                ref={repairInputRef} 
                                                onChange={handleRepair} 
                                                className="hidden" 
                                                accept="video/*"
                                            />
                                        </div>
                                    </div>
                                ) : (
                                    <video 
                                        key={selectedVideo.id + blobUrls[selectedVideo.id]} // Force re-render on video/url change
                                        controls 
                                        autoPlay 
                                        playsInline
                                        className="w-full h-full object-contain"
                                        src={getVideoSrc(selectedVideo)}
                                        type="video/mp4"
                                        onError={(e) => {
                                            console.error("Video Error:", e);
                                            setVideoError(true);
                                        }}
                                    >
                                        Your browser does not support the video tag.
                                    </video>
                                )
                           )}
                        </>
                      ) : (
                        <div className="text-center text-gray-600 p-4">
                           <Youtube size={48} className="mx-auto mb-2 opacity-50"/>
                           <p>SELECT_VIDEO_SOURCE</p>
                        </div>
                      )}
                   </div>
                   
                   {selectedVideo && (
                      <div className="mt-4 animate-fadeIn">
                        {/* Title & Stats */}
                        <h1 className="text-xl font-bold text-terminal-accent mb-2">{selectedVideo.title}</h1>
                        
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border-b border-terminal-dim pb-4 mb-4">
                             <p className="text-xs text-gray-500 font-mono">
                                 {selectedVideo.views.toLocaleString()} views • {selectedVideo.filename}
                             </p>
                             
                             <div className="flex items-center gap-4">
                                 {/* Like */}
                                 <button onClick={toggleLike} className={`flex items-center gap-1 px-3 py-1 rounded-full transition-all ${likedVideos[selectedVideo.id] ? 'bg-terminal-text text-black' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                                     <ThumbsUp size={16} className={likedVideos[selectedVideo.id] ? 'fill-black' : ''}/>
                                     <span className="text-sm font-bold">{selectedVideo.likes}</span>
                                 </button>
                                 
                                 {/* Subscribe */}
                                 <button 
                                    onClick={toggleSubscribe}
                                    className={`px-4 py-1 rounded text-sm font-bold transition-all ${subscribed ? 'bg-gray-800 text-gray-400 border border-gray-600' : 'bg-terminal-accent text-black hover:bg-white'}`}
                                 >
                                    {subscribed ? 'SUBSCRIBED' : 'SUBSCRIBE'}
                                 </button>

                                 {/* Bell */}
                                 {subscribed && (
                                     <button onClick={toggleBell} className="text-terminal-accent transition-transform hover:scale-110">
                                         {bell ? <BellRing size={20} /> : <Bell size={20} />}
                                     </button>
                                 )}
                             </div>
                        </div>

                        {/* Comments */}
                        <CommentsSection 
                            comments={videoComments[selectedVideo.id] || []}
                            onAddComment={addComment}
                        />
                      </div>
                   )}
                </div>

                {/* Playlist Sidebar */}
                <div className="bg-terminal-dark border border-terminal-dim rounded-lg p-4 h-fit max-h-[600px] overflow-y-auto">
                   <div className="flex justify-between items-center mb-4">
                       <h3 className="font-bold text-terminal-accent text-sm">UP NEXT</h3>
                       <div className="flex gap-1">
                           <button onClick={handleUrlLink} className="p-1 hover:bg-gray-800 rounded text-terminal-accent" title="Link URL">
                               <Globe size={16} />
                           </button>
                           <button onClick={triggerFileInput} className="p-1 hover:bg-gray-800 rounded text-terminal-accent" title="Link Local File">
                               <Plus size={16} />
                           </button>
                           <input 
                              type="file" 
                              ref={fileInputRef} 
                              className="hidden" 
                              accept="video/*" 
                              onChange={handleFileLink}
                           />
                       </div>
                   </div>
                   
                   <div className="space-y-2">
                      {videos.map(video => {
                         const isVideoYT = isYouTube(video.filename);
                         const thumbnail = isVideoYT 
                             ? `https://img.youtube.com/vi/${getYouTubeId(video.filename)}/default.jpg` 
                             : null;
                         
                         return (
                             <div 
                                key={video.id}
                                onClick={() => setSelectedVideo(video)}
                                className={`p-2 rounded cursor-pointer transition-all flex gap-3 items-start group ${selectedVideo?.id === video.id ? 'bg-terminal-dim/50 border border-terminal-accent' : 'hover:bg-gray-900 border border-transparent'}`}
                             >
                                {/* Thumbnail */}
                                <div className="w-24 h-16 bg-black border border-gray-800 flex items-center justify-center shrink-0 overflow-hidden relative">
                                    {thumbnail ? (
                                        <img src={thumbnail} alt="thumb" className="w-full h-full object-cover" />
                                    ) : (
                                        <div className="text-gray-600">
                                            <Film size={20} />
                                        </div>
                                    )}
                                    {selectedVideo?.id === video.id && (
                                        <div className="absolute inset-0 bg-terminal-accent/20 flex items-center justify-center">
                                            <Play size={20} className="fill-terminal-accent text-terminal-accent" />
                                        </div>
                                    )}
                                </div>
                                
                                <div className="flex-1 min-w-0">
                                    <p className={`text-sm truncate font-bold leading-tight mb-1 ${selectedVideo?.id === video.id ? 'text-terminal-accent' : 'text-gray-300'}`}>
                                        {video.title}
                                    </p>
                                    <p className="text-[10px] text-gray-500 truncate">{video.filename}</p>
                                </div>
                                
                                <button 
                                    onClick={(e) => deleteVideo(video.id, e)}
                                    className="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-500 transition-opacity"
                                >
                                    <Trash2 size={12} />
                                </button>
                             </div>
                         );
                      })}
                   </div>
                </div>
             </div>
          </div>
        );
      };

      const App = () => {
        const [activeTab, setActiveTab] = useState('home');

        return (
          <div className="min-h-screen p-4 flex flex-col relative font-mono text-terminal-text bg-terminal-bg selection:bg-terminal-accent selection:text-black">
            
            {/* Header */}
            <header className="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-terminal-dim pb-4">
              <div className="mb-4 md:mb-0">
                <h1 className="text-4xl font-bold text-terminal-accent tracking-tighter flex items-center gap-3">
                  <TerminalIcon className="w-8 h-8 animate-pulse-fast" />
                  Blue-Terminal
                </h1>
                <p className="text-sm text-gray-500 mt-1">
                   <Typewriter text="> Initializing secure connection..." speed={30} delay={500} />
                </p>
              </div>
              
              <nav className="flex gap-2 bg-terminal-dark p-1 rounded border border-terminal-dim">
                {[
                  { id: 'home', label: '~/home', icon: User },
                  { id: 'media', label: '~/media', icon: Film },
                  { id: 'spots', label: '~/spots', icon: Code },
                  { id: 'chat', label: '~/chat', icon: MessageSquare },
                ].map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-4 py-2 rounded flex items-center gap-2 text-sm transition-all duration-300 ${
                      activeTab === tab.id 
                        ? 'bg-terminal-dim text-terminal-accent shadow-[0_0_10px_#00ff00]' 
                        : 'text-gray-500 hover:text-terminal-text hover:bg-gray-900'
                    }`}
                  >
                    <tab.icon size={16} />
                    {tab.label}
                  </button>
                ))}
              </nav>
            </header>

            {/* Content Area */}
            <main className="flex-grow container mx-auto animate-fadeIn">
              
              {activeTab === 'home' && (
                <div className="max-w-3xl mx-auto">
                   <div className="mb-12 border-l-2 border-terminal-accent pl-6 py-2">
                      <h2 className="text-3xl font-bold text-gray-100 mb-4">Welcome to Blue-Terminal</h2>
                      <p className="text-xl text-terminal-accent mb-2">> I am the Internet</p>
                      <p className="text-gray-400 leading-relaxed max-w-2xl">
                        Passionate about programming and cryptography. Always eager to take on new challenges 
                        to sharpen my skills. Creating secure, efficient solutions is my directive.
                      </p>
                   </div>

                   <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                      <div className="bg-terminal-dark p-6 rounded border border-terminal-dim hover:border-terminal-accent transition-colors group">
                          <h3 className="text-terminal-accent font-bold mb-4 flex items-center gap-2">
                             <Code className="w-5 h-5" /> Directive
                          </h3>
                          <ul className="space-y-2 text-gray-400 text-sm">
                             <li className="flex items-center gap-2"><span className="text-terminal-accent">></span> Programmer</li>
                             <li className="flex items-center gap-2"><span className="text-terminal-accent">></span> Cryptography Enthusiast</li>
                             <li className="flex items-center gap-2"><span className="text-terminal-accent">></span> Open Source Contributor</li>
                          </ul>
                      </div>
                      
                      <div className="bg-terminal-dark p-6 rounded border border-terminal-dim hover:border-terminal-accent transition-colors">
                           <h3 className="text-terminal-accent font-bold mb-4 flex items-center gap-2">
                             <TerminalIcon className="w-5 h-5" /> Tech Stack
                          </h3>
                          <div className="flex flex-wrap gap-4">
                            <TechBadge src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python" label="Python" />
                            <TechBadge src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg" alt="Java" label="Java" />
                            <TechBadge src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/c/c-original.svg" alt="C" label="C" />
                            <TechBadge src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/csharp/csharp-original.svg" alt="C#" label="C#" />
                          </div>
                      </div>
                   </div>
                </div>
              )}

              {activeTab === 'spots' && <SpotManager />}
              {activeTab === 'chat' && <ChatManager />}
              {activeTab === 'media' && <VideoHub />}

            </main>

            <footer className="mt-12 text-center text-gray-700 text-xs border-t border-terminal-dim pt-4 font-mono">
               <p>root@blue-terminal:~# logout</p>
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
